name: Auto Post Telegram Direct

on:
  workflow_dispatch:
  schedule:
    # 02:17 UTC = 09:17 WIB
    - cron: '17 2 * * *'
    # 09:43 UTC = 16:43 WIB
    - cron: '43 9 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Ini sudah diperbaiki dari typo sebelumnya

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Playwright Browsers are Installed
      run: |
        python -m playwright install chromium --with-deps # Mengunci hanya unduh Chromium saja agar cepat dan hemat RAM

    - name: Jalankan Script Bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py
